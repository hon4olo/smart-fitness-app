name: Generate SecureStore lock

on:
  push:
    branches: [codex/secure-token-store]

permissions:
  contents: write

jobs:
  generate:
    if: ${{ !contains(github.event.head_commit.message, '[lock-generated]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: codex/secure-token-store
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install SDK-compatible SecureStore
        run: npm install expo-secure-store@~56.0.4 --save

      - name: Commit dependency lock
        run: |
          if git diff --quiet -- package.json package-lock.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: add expo secure store dependency [lock-generated]"
          git push origin HEAD:codex/secure-token-store
