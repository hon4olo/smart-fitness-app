name: Mobile CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Changed file line limit
        run: node scripts/check-changed-file-lines.mjs

      - name: TypeScript
        id: typescript
        run: npx tsc --noEmit > typescript.log 2>&1

      - name: Upload TypeScript log
        if: failure() && steps.typescript.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: mobile-typescript-log
          path: typescript.log
          if-no-files-found: error
          retention-days: 3

      - name: Coach and sync contract tests
        id: contract-tests
        run: >-
          npx vitest run
          src/auth/createAuthService.session-cache.test.ts
          src/auth/migrating-token-manager.test.ts
          src/context/appContext/AppMutationQueue.test.ts
          src/context/appContext/AppMutationOutboxRecovery.test.ts
          src/context/applySyncPullResult.concurrent.test.ts
          src/context/syncConflictCount.test.ts
          src/api/coach.test.ts
          src/api/coach.capabilities.v3.test.ts
          src/api/coach.capabilities.v4.test.ts
          src/api/coach.capabilities.v5.test.ts
          src/api/coach.capabilities.v6.test.ts
          src/api/coach.capabilities.v7.test.ts
          src/api/coach.safety-recovery.test.ts
          src/api/coach.combined.test.ts
          src/api/coach.strength-strategy.test.ts
          src/api/coach.strength-confirmation.test.ts
          src/features/coach/combinedCoachViewModel.test.ts
          src/features/coach/combinedCoachProposalViewModel.test.ts
          src/features/coach/recoveryCheckInForm.test.ts
          src/features/coach/userLimitationForm.test.ts
          src/features/coach/safetyRecoveryLocalSummary.test.ts
          src/features/coach/safetyRecoveryReviewSnapshot.test.ts
          src/features/coach/safetyRecoveryViewModel.test.ts
          src/features/coach/strengthCoachViewModel.test.ts
          src/features/coach/strengthStrategyViewModel.test.ts
          src/features/coach/nutritionCoachViewModel.test.ts
          src/features/nutrition/addFoodModel.test.ts
          src/features/progress/bodyMeasurementModel.test.ts
          src/features/progress/safetyRecoveryProgressAnalytics.test.ts
          src/features/progress/safetyRecoveryWeeklyTrend.test.ts
          src/features/workouts/workoutHistoryViewModel.test.ts
          src/features/workouts/workoutSafetyGateModel.test.ts
          src/features/workouts/workoutSafetySessionMetadata.test.ts
          src/cloud/createProductionCloudProvider.auth-refresh.test.ts
          src/cloud/CloudConflictResolver.two-device.test.ts
          src/cloud/TrainingProgramConflict.two-device.test.ts
          src/cloud/MealTemplateConflict.two-device.test.ts
          src/cloud/CustomExerciseConflict.two-device.test.ts
          src/cloud/BodyMeasurementConflict.two-device.test.ts
          src/cloud/NutritionTargetConflict.two-device.test.ts
          src/cloud/SafetyRecoveryConflict.two-device.test.ts
          src/cloud/SyncCoordinatorDeleteConflict.two-device.test.ts
          src/cloud/BodyMeasurementSync.test.ts
          src/cloud/CustomExerciseSyncPlanner.test.ts
          src/cloud/CustomExerciseRemoteSync.test.ts
          src/cloud/WorkoutSessionSync.test.ts
          src/cloud/WorkoutSessionSafetyMetadataSync.test.ts
          src/cloud/SafetyRecoverySync.test.ts
          src/cloud/SafetyRecoverySyncPlanner.test.ts
          src/cloud/WorkoutTemplateSync.test.ts
          src/cloud/WorkoutTemplateSyncPlanner.test.ts
          src/cloud/TrainingProgramSync.test.ts
          src/cloud/TrainingProgramSyncPlanner.test.ts
          src/storage/WorkoutTemplateSyncMetadataStore.test.ts
          src/cloud/FoodEntrySync.test.ts
          src/repositories/FoodEntrySyncingRepository.test.ts
          src/cloud/MealTemplateSyncPlanner.test.ts
          src/cloud/MealTemplateRemoteSync.test.ts
          src/cloud/NutritionTargetSync.test.ts
          src/repositories/NutritionTargetSyncingRepository.test.ts
          src/storage/AsyncStorageOperationQueueStore.concurrent.test.ts
          > contract-tests.log 2>&1

      - name: Upload contract test log
        if: failure() && steps.contract-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: mobile-contract-test-log
          path: contract-tests.log
          if-no-files-found: error
          retention-days: 3

      - name: Full regression suite
        id: regressions
        run: npm test > regression-tests.log 2>&1

      - name: Upload regression test log
        if: failure() && steps.regressions.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: mobile-regression-test-log
          path: regression-tests.log
          if-no-files-found: error
          retention-days: 3
