name: Mobile CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        id: typescript
        run: npx tsc --noEmit > typescript.log 2>&1

      - name: Upload TypeScript log
        if: failure() && steps.typescript.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: mobile-typescript-log
          path: typescript.log
          if-no-files-found: error
          retention-days: 3

      - name: Coach contract tests
        id: coach-tests
        run: npx vitest run src/api/coach.test.ts src/features/coach/strengthCoachViewModel.test.ts > coach-tests.log 2>&1

      - name: Upload coach test log
        if: failure() && steps.coach-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coach-test-log
          path: coach-tests.log
          if-no-files-found: error
          retention-days: 3

      - name: Full regression diagnostics
        id: regressions
        continue-on-error: true
        run: npm test > regression-tests.log 2>&1

      - name: Upload regression diagnostics
        if: always() && steps.regressions.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: mobile-regression-test-log
          path: regression-tests.log
          if-no-files-found: error
          retention-days: 3

      - name: Report legacy regression status
        if: always() && steps.regressions.outcome == 'failure'
        run: echo "::warning::The full legacy regression suite still has known stale assertions; see mobile-regression-test-log."
